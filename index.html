<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO Web</title>
    <link type="text/css" href="style/main.css" rel="stylesheet"/>
    <script type="module"src="src/loginStore.js"></script>
    <style>
        #login-message {
            border: 1px dashed black;
            color: red;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>Đăng nhập</h1>
    <form id="login-form" method="post" action="xulydangnhap.php">
        <label>Email </label>
        <input type="email" id="email-input" />
        <br/>

        <label>Password </label>
        <input type="password" id="password-input"/>
        <br/>
        
        <button type="submit" id="login-button" data-testid="login-submit">Đăng nhập</button>
        <div id="login-message"></div>
    </form>
    <script>
        //tìm phần tử có id "form-login"
        const loginForm = document.getElementById("login-form");
        //đăng ký sự kiện "submit"
        loginForm.addEventListener("submit", function(event){
            event.preventDefault(); //chặn form gửi dữ liệu đi
            //thu thập thông tin input
            var email = document.getElementById("email-input").value.trim();
            var password = document.getElementById("password-input").value.trim();
            //gọi hàm xử lý
            var thongbao = login(email,password);
            //thông báo kết quả
            document.getElementById("login-message").innerText = thongbao;
        })
    </script>
</body>
</html>
